apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/isaradhi24/devops-lab.git'
    targetRevision: main
    path: k8s/demo-app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

# apply this on k8s-master once cluster is ready
# kubectl apply -f /vagrant/scripts/gitops/argocd_app_demo.yaml